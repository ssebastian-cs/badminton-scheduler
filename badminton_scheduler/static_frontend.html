    <script>
        const API_BASE = 'http://localhost:5000';
        let currentUser = null;

        // Set today's date as default
        document.getElementById('availDate').valueAsDate = new Date();

        // Time input functionality
        function toggleTimeInputs() {
            const allDayCheck = document.getElementById('allDayCheck');
            const timeInputs = document.getElementById('timeInputs');
            
            if (allDayCheck.checked) {
                timeInputs.classList.add('hidden');
                clearTimeValidation();
            } else {
                timeInputs.classList.remove('hidden');
            }
        }

        function clearTimeValidation() {
            const timeStart = document.getElementById('timeStart');
            const timeEnd = document.getElementById('timeEnd');
            const timeStartError = document.getElementById('timeStartError');
            const timeEndError = document.getElementById('timeEndError');
            
            timeStart.classList.remove('field-error');
            timeEnd.classList.remove('field-error');
            timeStartError.classList.add('hidden');
            timeEndError.classList.add('hidden');
            
            timeStart.value = '';
            timeEnd.value = '';
        }

        function validateTimeInputs() {
            const allDayCheck = document.getElementById('allDayCheck');
            const timeStart = document.getElementById('timeStart');
            const timeEnd = document.getElementById('timeEnd');
            const timeStartError = document.getElementById('timeStartError');
            const timeEndError = document.getElementById('timeEndError');
            
            let isValid = true;
            
            // Clear previous validation
            clearFieldValidation(timeStart, timeStartError);
            clearFieldValidation(timeEnd, timeEndError);
            
            // If all-day is checked, no validation needed
            if (allDayCheck.checked) {
                return true;
            }
            
            // Comprehensive time validation
            const startTimeValid = validateTimeField(timeStart, timeStartError, 'start time');
            const endTimeValid = validateTimeField(timeEnd, timeEndError, 'end time');
            
            isValid = startTimeValid && endTimeValid;
            
            // Validate time logic if both times are provided and individually valid
            if (isValid && timeStart.value && timeEnd.value) {
                const timeLogicValid = validateTimeLogic(timeStart, timeEnd, timeEndError);
                isValid = isValid && timeLogicValid;
            }
            
            return isValid;
        }

        function validateTimeField(timeInput, errorElement, fieldName) {
            const value = timeInput.value.trim();
            
            // Check if required (for non-all-day availability)
            if (!value) {
                showFieldError(timeInput, errorElement, `${fieldName} is required when not all-day`);
                return false;
            }
            
            // Validate time format (HTML5 time input should handle this, but add extra validation)
            const timePattern = /^([01]?[0-9]|2[0-3]):[0-5][0-9]$/;
            if (!timePattern.test(value)) {
                showFieldError(timeInput, errorElement, `Invalid ${fieldName} format. Use HH:MM (24-hour format)`);
                return false;
            }
            
            // Parse and validate time components
            const [hours, minutes] = value.split(':').map(Number);
            
            if (hours < 0 || hours > 23) {
                showFieldError(timeInput, errorElement, `Hours must be between 00-23, got ${hours.toString().padStart(2, '0')}`);
                return false;
            }
            
            if (minutes < 0 || minutes > 59) {
                showFieldError(timeInput, errorElement, `Minutes must be between 00-59, got ${minutes.toString().padStart(2, '0')}`);
                return false;
            }
            
            // Check for reasonable time values (business hours validation could be added here)
            // For now, we'll allow any valid 24-hour time
            
            return true;
        }

        function validateTimeLogic(timeStartInput, timeEndInput, errorElement) {
            const startValue = timeStartInput.value;
            const endValue = timeEndInput.value;
            
            if (!startValue || !endValue) {
                return true; // Individual validation will catch missing values
            }
            
            try {
                const startTime = new Date(`2000-01-01T${startValue}:00`);
                const endTime = new Date(`2000-01-01T${endValue}:00`);
                
                // Check if end time is after start time
                if (endTime <= startTime) {
                    const startFormatted = formatTime(startValue);
                    const endFormatted = formatTime(endValue);
                    showFieldError(
                        timeEndInput, 
                        errorElement, 
                        `End time (${endFormatted}) must be after start time (${startFormatted})`
                    );
                    return false;
                }
                
                // Check for reasonable time spans
                const timeDiffMs = endTime.getTime() - startTime.getTime();
                const timeDiffMinutes = timeDiffMs / (1000 * 60);
                
                // Check for very short time spans (less than 15 minutes)
                if (timeDiffMinutes < 15) {
                    showFieldError(
                        timeEndInput, 
                        errorElement, 
                        `Time span is very short (${Math.round(timeDiffMinutes)} minutes). Consider extending the duration.`
                    );
                    // This is a warning, not an error - still return true
                }
                
                // Check for very long time spans (more than 12 hours)
                if (timeDiffMinutes > 12 * 60) {
                    showFieldError(
                        timeEndInput, 
                        errorElement, 
                        `Time span is very long (${Math.round(timeDiffMinutes / 60)} hours). Please verify this is correct.`
                    );
                    // This is a warning, not an error - still return true
                }
                
                return true;
                
            } catch (error) {
                showFieldError(timeEndInput, errorElement, 'Error validating time range');
                return false;
            }
        }

        function showFieldError(inputElement, errorElement, message) {
            inputElement.classList.add('field-error');
            errorElement.textContent = message;
            errorElement.classList.remove('hidden');
        }

        function clearFieldValidation(inputElement, errorElement) {
            inputElement.classList.remove('field-error');
            errorElement.classList.add('hidden');
            errorElement.textContent = '';
        }

        function validateDateInput(dateInput, errorElement, fieldName) {
            const value = dateInput.value.trim();
            
            if (!value) {
                showFieldError(dateInput, errorElement, `${fieldName} is required`);
                return false;
            }
            
            // Validate date format (HTML5 date input should handle this)
            const datePattern = /^\d{4}-\d{2}-\d{2}$/;
            if (!datePattern.test(value)) {
                showFieldError(dateInput, errorElement, `Invalid ${fieldName} format. Use YYYY-MM-DD`);
                return false;
            }
            
            try {
                const date = new Date(value);
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                
                // Check if date is valid
                if (isNaN(date.getTime())) {
                    showFieldError(dateInput, errorElement, `Invalid ${fieldName}. Please select a valid date`);
                    return false;
                }
                
                // Check if date is in the past (for availability setting)
                if (fieldName.toLowerCase().includes('availability') && date < today) {
                    showFieldError(dateInput, errorElement, 'Cannot set availability for past dates');
                    return false;
                }
                
                // Check for reasonable date ranges
                const minDate = new Date('2020-01-01');
                const maxDate = new Date('2030-12-31');
                
                if (date < minDate) {
                    showFieldError(dateInput, errorElement, `${fieldName} cannot be before ${minDate.toISOString().split('T')[0]}`);
                    return false;
                }
                
                if (date > maxDate) {
                    showFieldError(dateInput, errorElement, `${fieldName} cannot be after ${maxDate.toISOString().split('T')[0]}`);
                    return false;
                }
                
                return true;
                
            } catch (error) {
                showFieldError(dateInput, errorElement, `Error validating ${fieldName}`);
                return false;
            }
        }

        function validateFormData() {
            const availDate = document.getElementById('availDate');
            const availStatus = document.getElementById('availStatus');
            const playPreference = document.getElementById('playPreference');
            const notes = document.getElementById('notes');
            
            let isValid = true;
            
            // Validate date
            const dateError = document.createElement('span');
            dateError.className = 'error-message hidden';
            dateError.id = 'dateError';
            
            if (!availDate.parentNode.querySelector('#dateError')) {
                availDate.parentNode.appendChild(dateError);
            } else {
                dateError = availDate.parentNode.querySelector('#dateError');
            }
            
            clearFieldValidation(availDate, dateError);
            const dateValid = validateDateInput(availDate, dateError, 'availability date');
            isValid = isValid && dateValid;
            
            // Validate status
            if (!availStatus.value) {
                showMessage('Please select an availability status', 'error');
                isValid = false;
            }
            
            // Validate notes length
            if (notes.value && notes.value.length > 1000) {
                showMessage('Notes cannot exceed 1000 characters', 'error');
                isValid = false;
            }
            
            // Validate time inputs
            const timeValid = validateTimeInputs();
            isValid = isValid && timeValid;
            
            return isValid;
        }

        function handleApiError(error, defaultMessage = 'An error occurred') {
            let errorMessage = defaultMessage;
            
            if (error.error) {
                errorMessage = error.error;
                
                // Handle field-specific errors
                if (error.field) {
                    const fieldElement = document.getElementById(error.field);
                    if (fieldElement) {
                        fieldElement.classList.add('field-error');
                        
                        // Try to find or create error element for the field
                        let errorElement = document.getElementById(error.field + 'Error');
                        if (!errorElement) {
                            errorElement = document.createElement('span');
                            errorElement.className = 'error-message';
                            errorElement.id = error.field + 'Error';
                            fieldElement.parentNode.appendChild(errorElement);
                        }
                        
                        errorElement.textContent = errorMessage;
                        errorElement.classList.remove('hidden');
                    }
                }
            }
            
            showMessage(errorMessage, 'error');
        }

        // Helper function to format time from 24h to 12h format
        function formatTime(timeString) {
            if (!timeString) return '';
            
            const [hours, minutes] = timeString.split(':');
            const hour = parseInt(hours);
            const ampm = hour >= 12 ? 'PM' : 'AM';
            const displayHour = hour === 0 ? 12 : hour > 12 ? hour - 12 : hour;
            
            return `${displayHour}:${minutes} ${ampm}`;
        }

        // Add event listeners for real-time validation
        document.addEventListener('DOMContentLoaded', function() {
            const timeStart = document.getElementById('timeStart');
            const timeEnd = document.getElementById('timeEnd');
            
            if (timeStart && timeEnd) {
                timeStart.addEventListener('blur', validateTimeInputs);
                timeEnd.addEventListener('blur', validateTimeInputs);
            }
        });

        function showMessage(message, type = 'success') {
            const messagesDiv = document.getElementById('messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = type;
            messageDiv.textContent = message;
            messagesDiv.appendChild(messageDiv);
            
            setTimeout(() => {
                messagesDiv.removeChild(messageDiv);
            }, 5000);
        }

        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            if (!username || !password) {
                showMessage('Please enter username and password', 'error');
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    credentials: 'include',
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    currentUser = data.user;
                    document.getElementById('loginSection').classList.add('hidden');
                    document.getElementById('appSection').classList.remove('hidden');
                    document.getElementById('userInfo').textContent = 
                        `Welcome, ${currentUser.username}${currentUser.is_admin ? ' (Admin)' : ''}`;
                    showMessage('Login successful!');
                    loadAvailability();
                    loadFeedback();
                    showAdminSection(); // Show admin section if user is admin
                } else {
                    showMessage(data.error || 'Login failed', 'error');
                }
            } catch (error) {
                showMessage('Network error: ' + error.message, 'error');
            }
        }

        async function logout() {
            try {
                await fetch(`${API_BASE}/auth/logout`, {
                    credentials: 'include'
                });
                
                currentUser = null;
                document.getElementById('loginSection').classList.remove('hidden');
                document.getElementById('appSection').classList.add('hidden');
                document.getElementById('username').value = '';
                document.getElementById('password').value = '';
                showMessage('Logged out successfully');
            } catch (error) {
                showMessage('Logout error: ' + error.message, 'error');
            }
        }

        async function setAvailability() {
            // Clear any previous field errors
            clearAllFieldErrors();
            
            // Comprehensive form validation
            if (!validateFormData()) {
                showMessage('Please fix the form errors before submitting', 'error');
                return;
            }
            
            const date = document.getElementById('availDate').value;
            const status = document.getElementById('availStatus').value;
            const playPreference = document.getElementById('playPreference').value;
            const notes = document.getElementById('notes').value;
            const allDayCheck = document.getElementById('allDayCheck');
            const timeStart = document.getElementById('timeStart').value;
            const timeEnd = document.getElementById('timeEnd').value;
            
            // Prepare request body with sanitized data
            const requestBody = {
                date: date.trim(),
                status: status.trim(),
                play_preference: playPreference.trim() || null,
                notes: notes.trim() || null,
                is_all_day: allDayCheck.checked
            };
            
            // Add time data if not all-day
            if (!allDayCheck.checked) {
                requestBody.time_start = timeStart.trim();
                requestBody.time_end = timeEnd.trim();
            }
            
            // Show loading state
            const submitButton = event.target;
            const originalText = submitButton.textContent;
            submitButton.textContent = 'Setting Availability...';
            submitButton.disabled = true;
            
            try {
                const response = await fetch(`${API_BASE}/api/availability`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    credentials: 'include',
                    body: JSON.stringify(requestBody)
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showMessage(data.message || 'Availability set successfully!');
                    // Reset form
                    resetAvailabilityForm();
                    loadAvailability();
                } else {
                    // Handle API errors with enhanced error display
                    handleApiError(data, 'Failed to set availability');
                }
            } catch (error) {
                console.error('Network error:', error);
                showMessage('Network error: Unable to connect to server. Please check your connection and try again.', 'error');
            } finally {
                // Restore button state
                submitButton.textContent = originalText;
                submitButton.disabled = false;
            }
        }

        function clearAllFieldErrors() {
            // Clear all field error states
            const errorFields = document.querySelectorAll('.field-error');
            errorFields.forEach(field => field.classList.remove('field-error'));
            
            const errorMessages = document.querySelectorAll('.error-message:not(.hidden)');
            errorMessages.forEach(msg => msg.classList.add('hidden'));
        }

        function resetAvailabilityForm() {
            document.getElementById('notes').value = '';
            document.getElementById('allDayCheck').checked = true;
            document.getElementById('timeStart').value = '';
            document.getElementById('timeEnd').value = '';
            toggleTimeInputs(); // Hide time inputs and clear validation
            clearAllFieldErrors();
        }

        async function submitFeedback() {
            const content = document.getElementById('feedbackContent').value;
            const rating = document.getElementById('rating').value;
            
            if (!content.trim()) {
                showMessage('Please enter feedback content', 'error');
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/api/feedback`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    credentials: 'include',
                    body: JSON.stringify({
                        content,
                        rating: rating ? parseInt(rating) : null,
                        is_public: true
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showMessage('Feedback submitted successfully!');
                    document.getElementById('feedbackContent').value = '';
                    document.getElementById('rating').value = '';
                    loadFeedback();
                } else {
                    showMessage(data.error || 'Failed to submit feedback', 'error');
                }
            } catch (error) {
                showMessage('Network error: ' + error.message, 'error');
            }
        }

        // Helper function to format date for display
        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('en-US', { 
                weekday: 'short', 
                year: 'numeric', 
                month: 'short', 
                day: 'numeric' 
            });
        }

        // Helper function to create time display string
        function createTimeDisplay(item) {
            // Distinguish between all-day and time-specific entries
            if (item.is_all_day === true || item.is_all_day === undefined) {
                return '<span class="time-badge all-day">All Day</span>';
            }
            
            // Handle time-specific entries
            if (item.is_all_day === false) {
                if (item.time_start && item.time_end) {
                    const startTime = formatTime(item.time_start);
                    const endTime = formatTime(item.time_end);
                    return `<span class="time-badge time-range">${startTime} - ${endTime}</span>`;
                }
                
                if (item.time_start) {
                    const startTime = formatTime(item.time_start);
                    return `<span class="time-badge time-start">From ${startTime}</span>`;
                }
                
                if (item.time_end) {
                    const endTime = formatTime(item.time_end);
                    return `<span class="time-badge time-end">Until ${endTime}</span>`;
                }
            }
            
            // Handle legacy time_slot data
            if (item.legacy_time_slot) {
                return `<span class="time-badge legacy">${item.legacy_time_slot}</span>`;
            }
            
            return '<span class="time-badge all-day">All Day</span>';
        }

        // Helper function to get status display class and text
        function getStatusDisplay(status) {
            const statusMap = {
                'available': { class: 'status-available', text: 'Available' },
                'tentative': { class: 'status-tentative', text: 'Tentative' },
                'not_available': { class: 'status-not-available', text: 'Not Available' }
            };
            return statusMap[status] || { class: 'status-unknown', text: status };
        }

        // Helper function to group availability entries by date
        function groupAvailabilityByDate(data) {
            const grouped = {};
            
            data.forEach(item => {
                if (!grouped[item.date]) {
                    grouped[item.date] = [];
                }
                grouped[item.date].push(item);
            });
            
            // Sort dates and entries within each date
            const sortedDates = Object.keys(grouped).sort();
            const result = {};
            
            sortedDates.forEach(date => {
                // Sort entries by time (all-day first, then by start time)
                result[date] = grouped[date].sort((a, b) => {
                    // All-day entries come first
                    if (a.is_all_day && !b.is_all_day) return -1;
                    if (!a.is_all_day && b.is_all_day) return 1;
                    
                    // Both are time-specific, sort by start time
                    if (!a.is_all_day && !b.is_all_day) {
                        const aTime = a.time_start || '00:00';
                        const bTime = b.time_start || '00:00';
                        return aTime.localeCompare(bTime);
                    }
                    
                    return 0;
                });
            });
            
            return result;
        }

        async function loadAvailability() {
            try {
                const response = await fetch(`${API_BASE}/api/availability`, {
                    credentials: 'include'
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    // Store availability data for editing
                    availabilityData = data;
                    
                    const listDiv = document.getElementById('availabilityList');
                    if (data.length === 0) {
                        listDiv.innerHTML = '<p>No availability entries found.</p>';
                    } else {
                        // Group entries by date for better organization
                        const groupedData = groupAvailabilityByDate(data);
                        
                        let html = '';
                        Object.entries(groupedData).forEach(([date, entries]) => {
                            html += `<div class="date-group">`;
                            html += `<div class="date-header">${formatDate(date)}</div>`;
                            
                            entries.forEach(item => {
                                const statusDisplay = getStatusDisplay(item.status);
                                const timeDisplay = createTimeDisplay(item);
                                const isPastDate = new Date(item.date) < new Date().setHours(0,0,0,0);
                                
                                html += `
                                    <div class="availability-item" id="availability-${item.id}">
                                        <div class="availability-main">
                                            <div class="time-status-row">
                                                ${timeDisplay}
                                                <span class="status-badge ${statusDisplay.class}">${statusDisplay.text}</span>
                                            </div>
                                            ${item.play_preference && item.play_preference !== 'either' ? 
                                                `<div class="preference-row">
                                                    <span class="preference-badge">${item.play_preference.replace('_', ' ')}</span>
                                                </div>` : ''
                                            }
                                            ${item.notes ? 
                                                `<div class="notes-row">
                                                    <em>${item.notes}</em>
                                                </div>` : ''
                                            }
                                            ${!isPastDate ? `
                                                <div class="availability-actions">
                                                    <button class="action-btn edit-btn" onclick="editAvailability(${item.id})">Edit</button>
                                                    <button class="action-btn delete-btn" onclick="deleteAvailability(${item.id})">Delete</button>
                                                </div>
                                            ` : ''}
                                        </div>
                                    </div>
                                `;
                            });
                            
                            html += `</div>`;
                        });
                        
                        listDiv.innerHTML = html;
                    }
                } else {
                    showMessage('Failed to load availability', 'error');
                }
            } catch (error) {
                showMessage('Network error: ' + error.message, 'error');
            }
        }

        // Store original availability data for editing
        let availabilityData = [];

        // Edit availability functionality
        async function editAvailability(availabilityId) {
            const availabilityItem = document.getElementById(`availability-${availabilityId}`);
            if (!availabilityItem) {
                showMessage('Availability entry not found', 'error');
                return;
            }

            // Find the availability data
            const availability = availabilityData.find(item => item.id === availabilityId);
            if (!availability) {
                showMessage('Availability data not found', 'error');
                return;
            }

            // Create edit form
            const editFormHtml = `
                <div class="edit-form" id="edit-form-${availabilityId}">
                    <h4>Edit Availability</h4>
                    
                    <div class="form-group">
                        <label for="edit-date-${availabilityId}">Date:</label>
                        <input type="date" id="edit-date-${availabilityId}" value="${availability.date}">
                    </div>
                    
                    <div class="time-input-section">
                        <label class="checkbox-label">
                            <input type="checkbox" id="edit-all-day-${availabilityId}" ${availability.is_all_day ? 'checked' : ''} onchange="toggleEditTimeInputs(${availabilityId})"> All Day
                        </label>
                        <div id="edit-time-inputs-${availabilityId}" class="${availability.is_all_day ? 'hidden' : ''}">
                            <div class="time-inputs-container">
                                <div class="form-group">
                                    <label for="edit-time-start-${availabilityId}">Start Time:</label>
                                    <input type="time" id="edit-time-start-${availabilityId}" value="${availability.time_start || ''}">
                                    <span id="edit-time-start-error-${availabilityId}" class="error-message hidden"></span>
                                </div>
                                <div class="form-group">
                                    <label for="edit-time-end-${availabilityId}">End Time:</label>
                                    <input type="time" id="edit-time-end-${availabilityId}" value="${availability.time_end || ''}">
                                    <span id="edit-time-end-error-${availabilityId}" class="error-message hidden"></span>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="edit-status-${availabilityId}">Status:</label>
                        <select id="edit-status-${availabilityId}">
                            <option value="available" ${availability.status === 'available' ? 'selected' : ''}>Available</option>
                            <option value="tentative" ${availability.status === 'tentative' ? 'selected' : ''}>Tentative</option>
                            <option value="not_available" ${availability.status === 'not_available' ? 'selected' : ''}>Not Available</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="edit-preference-${availabilityId}">Play Preference:</label>
                        <select id="edit-preference-${availabilityId}">
                            <option value="either" ${availability.play_preference === 'either' ? 'selected' : ''}>Either</option>
                            <option value="drop_in" ${availability.play_preference === 'drop_in' ? 'selected' : ''}>Drop-in</option>
                            <option value="book_court" ${availability.play_preference === 'book_court' ? 'selected' : ''}>Book a Court</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="edit-notes-${availabilityId}">Notes:</label>
                        <textarea id="edit-notes-${availabilityId}" rows="2">${availability.notes || ''}</textarea>
                    </div>
                    
                    <div class="availability-actions">
                        <button class="action-btn save-btn" onclick="saveAvailabilityEdit(${availabilityId})">Save</button>
                        <button class="action-btn cancel-btn" onclick="cancelAvailabilityEdit(${availabilityId})">Cancel</button>
                    </div>
                </div>
            `;

            // Hide the main content and show edit form
            const mainContent = availabilityItem.querySelector('.availability-main');
            mainContent.style.display = 'none';
            availabilityItem.insertAdjacentHTML('beforeend', editFormHtml);
        }

        function toggleEditTimeInputs(availabilityId) {
            const allDayCheck = document.getElementById(`edit-all-day-${availabilityId}`);
            const timeInputs = document.getElementById(`edit-time-inputs-${availabilityId}`);
            
            if (allDayCheck.checked) {
                timeInputs.classList.add('hidden');
                clearEditTimeValidation(availabilityId);
            } else {
                timeInputs.classList.remove('hidden');
            }
        }

        function clearEditTimeValidation(availabilityId) {
            const timeStart = document.getElementById(`edit-time-start-${availabilityId}`);
            const timeEnd = document.getElementById(`edit-time-end-${availabilityId}`);
            const timeStartError = document.getElementById(`edit-time-start-error-${availabilityId}`);
            const timeEndError = document.getElementById(`edit-time-end-error-${availabilityId}`);
            
            if (timeStart) timeStart.classList.remove('field-error');
            if (timeEnd) timeEnd.classList.remove('field-error');
            if (timeStartError) timeStartError.classList.add('hidden');
            if (timeEndError) timeEndError.classList.add('hidden');
            
            if (timeStart) timeStart.value = '';
            if (timeEnd) timeEnd.value = '';
        }

        function validateEditTimeInputs(availabilityId) {
            const allDayCheck = document.getElementById(`edit-all-day-${availabilityId}`);
            const timeStart = document.getElementById(`edit-time-start-${availabilityId}`);
            const timeEnd = document.getElementById(`edit-time-end-${availabilityId}`);
            const timeStartError = document.getElementById(`edit-time-start-error-${availabilityId}`);
            const timeEndError = document.getElementById(`edit-time-end-error-${availabilityId}`);
            
            let isValid = true;
            
            // Clear previous validation
            timeStart.classList.remove('field-error');
            timeEnd.classList.remove('field-error');
            timeStartError.classList.add('hidden');
            timeEndError.classList.add('hidden');
            
            // If all-day is checked, no validation needed
            if (allDayCheck.checked) {
                return true;
            }
            
            // Validate start time is provided
            if (!timeStart.value) {
                timeStart.classList.add('field-error');
                timeStartError.textContent = 'Start time is required when not all-day';
                timeStartError.classList.remove('hidden');
                isValid = false;
            }
            
            // Validate end time is provided
            if (!timeEnd.value) {
                timeEnd.classList.add('field-error');
                timeEndError.textContent = 'End time is required when not all-day';
                timeEndError.classList.remove('hidden');
                isValid = false;
            }
            
            // Validate end time is after start time
            if (timeStart.value && timeEnd.value) {
                const startTime = new Date(`2000-01-01T${timeStart.value}`);
                const endTime = new Date(`2000-01-01T${timeEnd.value}`);
                
                if (endTime <= startTime) {
                    timeEnd.classList.add('field-error');
                    timeEndError.textContent = 'End time must be after start time';
                    timeEndError.classList.remove('hidden');
                    isValid = false;
                }
            }
            
            return isValid;
        }

        async function saveAvailabilityEdit(availabilityId) {
            // Validate time inputs
            if (!validateEditTimeInputs(availabilityId)) {
                showMessage('Please fix the time input errors', 'error');
                return;
            }

            const date = document.getElementById(`edit-date-${availabilityId}`).value;
            const status = document.getElementById(`edit-status-${availabilityId}`).value;
            const playPreference = document.getElementById(`edit-preference-${availabilityId}`).value;
            const notes = document.getElementById(`edit-notes-${availabilityId}`).value;
            const allDayCheck = document.getElementById(`edit-all-day-${availabilityId}`);
            const timeStart = document.getElementById(`edit-time-start-${availabilityId}`).value;
            const timeEnd = document.getElementById(`edit-time-end-${availabilityId}`).value;
            
            if (!date) {
                showMessage('Please select a date', 'error');
                return;
            }
            
            // Prepare request body
            const requestBody = {
                date,
                status,
                play_preference: playPreference,
                notes: notes || null,
                is_all_day: allDayCheck.checked
            };
            
            // Add time data if not all-day
            if (!allDayCheck.checked) {
                requestBody.time_start = timeStart;
                requestBody.time_end = timeEnd;
            }
            
            try {
                const response = await fetch(`${API_BASE}/api/availability/${availabilityId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    credentials: 'include',
                    body: JSON.stringify(requestBody)
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showMessage('Availability updated successfully!');
                    cancelAvailabilityEdit(availabilityId);
                    loadAvailability(); // Refresh the list
                } else {
                    showMessage(data.error || 'Failed to update availability', 'error');
                }
            } catch (error) {
                showMessage('Network error: ' + error.message, 'error');
            }
        }

        function cancelAvailabilityEdit(availabilityId) {
            const availabilityItem = document.getElementById(`availability-${availabilityId}`);
            const editForm = document.getElementById(`edit-form-${availabilityId}`);
            const mainContent = availabilityItem.querySelector('.availability-main');
            
            // Remove edit form and show main content
            if (editForm) {
                editForm.remove();
            }
            if (mainContent) {
                mainContent.style.display = 'block';
            }
        }

        async function deleteAvailability(availabilityId) {
            if (!confirm('Are you sure you want to delete this availability entry?')) {
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/api/availability/${availabilityId}`, {
                    method: 'DELETE',
                    credentials: 'include'
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showMessage('Availability entry deleted successfully!');
                    loadAvailability(); // Refresh the list
                } else {
                    showMessage(data.error || 'Failed to delete availability', 'error');
                }
            } catch (error) {
                showMessage('Network error: ' + error.message, 'error');
            }
        }

        async function loadFeedback() {
            try {
                const response = await fetch(`${API_BASE}/api/feedback?public=true`, {
                    credentials: 'include'
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    const listDiv = document.getElementById('feedbackList');
                    if (data.length === 0) {
                        listDiv.innerHTML = '<p>No feedback entries found.</p>';
                    } else {
                        listDiv.innerHTML = data.map(item => `
                            <div class="feedback-item">
                                <strong>${item.username || 'Anonymous'}</strong>
                                ${item.rating ? ` (${item.rating}/5 stars)` : ''}
                                <br>${item.content}
                                <br><small>${new Date(item.created_at).toLocaleDateString()}</small>
                            </div>
                        `).join('');
                    }
                } else {
                    showMessage('Failed to load feedback', 'error');
                }
            } catch (error) {
                showMessage('Network error: ' + error.message, 'error');
            }
        }

        // Admin filtering functionality
        let currentAdminPage = 1;
        let currentAdminFilters = {};
        
        function showAdminSection() {
            const adminSection = document.getElementById('adminSection');
            if (currentUser && currentUser.is_admin) {
                adminSection.classList.remove('hidden');
                loadAdminAvailability();
            } else {
                adminSection.classList.add('hidden');
            }
        }
        
        async function loadAdminAvailability(page = 1) {
            if (!currentUser || !currentUser.is_admin) {
                return;
            }
            
            try {
                // Build query parameters
                const params = new URLSearchParams();
                params.append('page', page);
                params.append('per_page', '20'); // Show 20 items per page
                
                // Add date filters if they exist
                if (currentAdminFilters.start_date) {
                    params.append('start_date', currentAdminFilters.start_date);
                }
                if (currentAdminFilters.end_date) {
                    params.append('end_date', currentAdminFilters.end_date);
                }
                
                const response = await fetch(`${API_BASE}/api/admin/availability/filtered?${params}`, {
                    credentials: 'include'
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    currentAdminPage = page;
                    displayAdminAvailability(data);
                    updatePaginationControls(data.pagination);
                    updateFilterStatus(data.filters, data.result_count, data.pagination.total_count);
                } else {
                    showMessage(data.error || 'Failed to load admin availability', 'error');
                }
            } catch (error) {
                showMessage('Network error: ' + error.message, 'error');
            }
        }
        
        function displayAdminAvailability(data) {
            const listDiv = document.getElementById('adminAvailabilityList');
            
            if (data.availability.length === 0) {
                listDiv.innerHTML = '<p>No availability entries found for the selected criteria.</p>';
                return;
            }
            
            // Group entries by date for better organization
            const groupedData = groupAvailabilityByDate(data.availability);
            
            let html = '';
            Object.entries(groupedData).forEach(([date, entries]) => {
                html += `<div class="date-group">`;
                html += `<div class="date-header">${formatDate(date)}</div>`;
                
                entries.forEach(item => {
                    const statusDisplay = getStatusDisplay(item.status);
                    const timeDisplay = createTimeDisplay(item);
                    
                    html += `
                        <div class="admin-availability-item">
                            <div class="admin-user-info">
                                <span class="admin-username">${item.username}</span>
                                <span class="admin-email">${item.user_email}</span>
                            </div>
                            <div class="availability-main">
                                <div class="time-status-row">
                                    ${timeDisplay}
                                    <span class="status-badge ${statusDisplay.class}">${statusDisplay.text}</span>
                                </div>
                                ${item.play_preference && item.play_preference !== 'either' ? 
                                    `<div class="preference-row">
                                        <span class="preference-badge">${item.play_preference.replace('_', ' ')}</span>
                                    </div>` : ''
                                }
                                ${item.notes ? 
                                    `<div class="notes-row">
                                        <em>${item.notes}</em>
                                    </div>` : ''
                                }
                            </div>
                        </div>
                    `;
                });
                
                html += `</div>`;
            });
            
            listDiv.innerHTML = html;
        }
        
        function applyAdminFilters() {
            const startDateInput = document.getElementById('filterStartDate');
            const endDateInput = document.getElementById('filterEndDate');
            const startDate = startDateInput.value.trim();
            const endDate = endDateInput.value.trim();
            
            // Clear previous validation errors
            clearFieldValidation(startDateInput, { classList: { add: () => {}, remove: () => {} }, textContent: '', classList: { add: () => {}, remove: () => {} } });
            clearFieldValidation(endDateInput, { classList: { add: () => {}, remove: () => {} }, textContent: '', classList: { add: () => {}, remove: () => {} } });
            
            // Validate individual dates if provided
            if (startDate) {
                if (!validateDateFormat(startDate)) {
                    showMessage('Invalid start date format. Use YYYY-MM-DD', 'error');
                    startDateInput.classList.add('field-error');
                    return;
                }
                
                if (!isValidDateRange(startDate)) {
                    showMessage('Start date is outside valid range (2020-2030)', 'error');
                    startDateInput.classList.add('field-error');
                    return;
                }
            }
            
            if (endDate) {
                if (!validateDateFormat(endDate)) {
                    showMessage('Invalid end date format. Use YYYY-MM-DD', 'error');
                    endDateInput.classList.add('field-error');
                    return;
                }
                
                if (!isValidDateRange(endDate)) {
                    showMessage('End date is outside valid range (2020-2030)', 'error');
                    endDateInput.classList.add('field-error');
                    return;
                }
            }
            
            // Validate date range logic
            if (startDate && endDate) {
                if (startDate > endDate) {
                    showMessage('Start date must be before or equal to end date', 'error');
                    endDateInput.classList.add('field-error');
                    return;
                }
                
                // Check for reasonable date ranges (not more than 5 years)
                const startDateObj = new Date(startDate);
                const endDateObj = new Date(endDate);
                const daysDiff = (endDateObj - startDateObj) / (1000 * 60 * 60 * 24);
                
                if (daysDiff > 5 * 365) {
                    showMessage('Date range cannot exceed 5 years', 'error');
                    return;
                }
                
                // Warn for very large ranges (more than 1 year)
                if (daysDiff > 365) {
                    if (!confirm(`You've selected a large date range (${Math.round(daysDiff)} days). This may take longer to load. Continue?`)) {
                        return;
                    }
                }
            }
            
            // Update current filters
            currentAdminFilters = {};
            if (startDate) {
                currentAdminFilters.start_date = startDate;
            }
            if (endDate) {
                currentAdminFilters.end_date = endDate;
            }
            
            // Show loading state
            showMessage('Applying filters...', 'info');
            
            // Reset to first page and load data
            loadAdminAvailability(1);
        }

        function validateDateFormat(dateString) {
            const datePattern = /^\d{4}-\d{2}-\d{2}$/;
            if (!datePattern.test(dateString)) {
                return false;
            }
            
            const date = new Date(dateString);
            return !isNaN(date.getTime()) && date.toISOString().split('T')[0] === dateString;
        }

        function isValidDateRange(dateString) {
            const date = new Date(dateString);
            const minDate = new Date('2020-01-01');
            const maxDate = new Date('2030-12-31');
            
            return date >= minDate && date <= maxDate;
        }
        
        function clearAdminFilters() {
            // Clear form inputs
            document.getElementById('filterStartDate').value = '';
            document.getElementById('filterEndDate').value = '';
            
            // Clear current filters
            currentAdminFilters = {};
            
            // Hide filter status
            document.getElementById('filterStatus').classList.add('hidden');
            
            // Reset to first page and load all data
            loadAdminAvailability(1);
        }
        
        function updateFilterStatus(filters, resultCount, totalCount) {
            const filterStatus = document.getElementById('filterStatus');
            const filterStatusText = document.getElementById('filterStatusText');
            const resultCountSpan = document.getElementById('resultCount');
            
            if (filters.start_date || filters.end_date) {
                let statusText = 'Filtered by: ';
                const filterParts = [];
                
                if (filters.start_date) {
                    filterParts.push(`from ${formatDate(filters.start_date)}`);
                }
                if (filters.end_date) {
                    filterParts.push(`to ${formatDate(filters.end_date)}`);
                }
                
                statusText += filterParts.join(' ');
                filterStatusText.textContent = statusText;
                resultCountSpan.textContent = `(${resultCount} of ${totalCount} entries)`;
                
                filterStatus.classList.remove('hidden');
            } else {
                filterStatus.classList.add('hidden');
            }
        }
        
        function updatePaginationControls(pagination) {
            const paginationControls = document.getElementById('paginationControls');
            const prevBtn = document.getElementById('prevPageBtn');
            const nextBtn = document.getElementById('nextPageBtn');
            const pageInfo = document.getElementById('pageInfo');
            
            if (pagination.total_pages > 1) {
                paginationControls.classList.remove('hidden');
                
                // Update buttons
                prevBtn.disabled = !pagination.has_prev;
                nextBtn.disabled = !pagination.has_next;
                
                // Update page info
                pageInfo.textContent = `Page ${pagination.page} of ${pagination.total_pages} (${pagination.total_count} total entries)`;
            } else {
                paginationControls.classList.add('hidden');
            }
        }
        
        function goToPreviousPage() {
            if (currentAdminPage > 1) {
                loadAdminAvailability(currentAdminPage - 1);
            }
        }
        
        function goToNextPage() {
            loadAdminAvailability(currentAdminPage + 1);
        }
        
        // Allow Enter key to login
        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                login();
            }
        });
    </script>
</body>
